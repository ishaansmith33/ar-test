<!DOCTYPE html>
<html>
  <head>
    <title>WebAR Test</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #startButton {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff4081;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        cursor: pointer;
        z-index: 999;
      }
    </style>

    <script>
      // Регистрируем компонент ДО загрузки сцены
      AFRAME.registerComponent('video-updater', {
        init: function () {
          this.video = document.getElementById('myVideo');
        },
        tick: function () {
          // Каждый кадр обновляем текстуру
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;
          mesh.traverse(function (node) {
            if (node.material && node.material.map) {
              node.material.map.needsUpdate = true;
            }
          });
        }
      });
    </script>
  </head>

  <body>
    <button id="startButton">Включить AR и Звук</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-assets>
        <video
          id="myVideo"
          src="video.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>

      <a-marker preset="hiro">
        <!-- a-plane надёжнее чем a-video для текстур -->
        <a-plane
          id="videoPlane"
          src="#myVideo"
          width="1.6"
          height="0.9"
          position="0 0.5 0"
          rotation="-90 0 0"
          video-updater>
        </a-plane>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const button = document.getElementById('startButton');
      const video = document.getElementById('myVideo');

      button.addEventListener('click', function () {
        // Сначала muted=true чтобы точно запустилось
        video.muted = true;
        video.play().then(function() {
          // После запуска включаем звук
          video.muted = false;
        }).catch(function(e) {
          console.log('Autoplay blocked:', e);
          video.muted = true;
          video.play();
        });
        button.style.display = 'none';
      });
    </script>
  </body>
</html>

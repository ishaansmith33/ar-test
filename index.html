<!DOCTYPE html>
<html>
  <head>
    <title>WebAR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }
      #startBtn {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 16px 32px;
        background: #ff4081;
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 20px;
        z-index: 9999;
        cursor: pointer;
      }
    </style>

    <script>
      // Регистрируем ДО загрузки сцены
      AFRAME.registerComponent('ios-video', {
        init: function () {
          // Создаём video элемент через JS — это ключевое для iOS
          const video = document.createElement('video');
          video.src = 'video.mp4';
          video.loop = true;
          video.muted = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');
          video.load();
          this.video = video;

          // Создаём Three.js текстуру и меш напрямую
          this.texture = new THREE.VideoTexture(video);
          this.texture.minFilter = THREE.LinearFilter;
          this.texture.magFilter = THREE.LinearFilter;

          const geometry = new THREE.PlaneGeometry(1.6, 0.9);
          const material = new THREE.MeshBasicMaterial({
            map: this.texture,
            side: THREE.DoubleSide
          });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.rotation.x = -Math.PI / 2;

          this.el.setObject3D('videoMesh', mesh);

          // Слушаем кнопку
          window.addEventListener('ar-video-start', () => {
            video.muted = false;
            video.play().catch(() => {
              video.muted = true;
              video.play();
            });
          });
        },

        tick: function () {
          // Обновляем каждый кадр — без этого iOS показывает чёрный
          if (this.video && !this.video.paused) {
            this.texture.needsUpdate = true;
          }
        }
      });
    </script>
  </head>

  <body>
    <button id="startBtn">▶ Запустить AR</button>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-marker preset="hiro">
        <a-entity ios-video></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      document.getElementById('startBtn').addEventListener('click', function () {
        // Диспатчим событие для компонента
        window.dispatchEvent(new Event('ar-video-start'));
        this.style.display = 'none';
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>WebAR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; background: #000; }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #overlay button {
        padding: 20px 40px;
        font-size: 22px;
        background: #ff4081;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
      }
    </style>

    <script>
      AFRAME.registerComponent('ios-video', {
        init: function () {
          // Видео ДОЛЖНО быть в DOM на iOS
          const video = document.createElement('video');
          video.id = 'arVideo';
          video.src = 'video.mp4';
          video.loop = true;
          video.muted = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');
          video.style.cssText = 'position:fixed;width:1px;height:1px;top:0;left:0;opacity:0;pointer-events:none;';
          document.body.appendChild(video);
          this.video = video;

          const texture = new THREE.VideoTexture(video);
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;
          texture.format = THREE.RGBFormat;
          this.texture = texture;

          const geo = new THREE.PlaneGeometry(1.6, 0.9);
          const mat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.set(0, 0.5, 0);
          this.el.setObject3D('mesh', mesh);
        },

        tick: function () {
          if (this.texture) this.texture.needsUpdate = true;
        }
      });
    </script>
  </head>

  <body>
    <div id="overlay">
      <button id="startBtn">▶ Нажми для запуска AR</button>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-marker preset="hiro">
        <a-entity ios-video></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // ВАЖНО: touchend, не click — это синхронный жест на iOS
      document.getElementById('startBtn').addEventListener('touchend', function (e) {
        e.preventDefault();
        const video = document.getElementById('arVideo');
        if (video) {
          // Синхронно, без промисов — iOS требует именно так
          video.muted = true;
          video.play();
        }
        document.getElementById('overlay').style.display = 'none';
      });

      // Фолбэк для ПК/тестирования
      document.getElementById('startBtn').addEventListener('click', function () {
        const video = document.getElementById('arVideo');
        if (video) {
          video.muted = true;
          video.play();
        }
        document.getElementById('overlay').style.display = 'none';
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>WebAR Test</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #startButton {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff4081;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        cursor: pointer;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <button id="startButton">Включить AR и Звук</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <!-- ключевые атрибуты: playsinline + webkit-playsinline + autoplay + muted -->
        <video
          id="myVideo"
          src="video.mp4"
          preload="auto"
          loop
          muted
          autoplay
          playsinline
          webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>

      <a-marker preset="hiro">
        <a-video
          src="#myVideo"
          width="1.6"
          height="0.9"
          position="0 0 0"
          rotation="-90 0 0">
        </a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const button = document.getElementById('startButton');
      const video = document.getElementById('myVideo');

      button.addEventListener('click', function () {
        video.muted = false;
        video.play().catch(() => {
          // если браузер блокирует — оставляем muted
          video.muted = true;
          video.play();
        });
        button.style.display = 'none';

        // Принудительно обновляем текстуру в A-Frame
        const aVideo = document.querySelector('a-video');
        if (aVideo && aVideo.components && aVideo.components.material) {
          aVideo.components.material.material.map.needsUpdate = true;
        }
      });

      // Запускаем видео как только сцена готова
      document.querySelector('a-scene').addEventListener('loaded', function () {
        video.play().catch(() => {});
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>WebAR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; background: #000; }

      #arVideo {
        position: fixed;
        width: 1px; height: 1px;
        top: 0; left: 0;
        opacity: 0.01;
        pointer-events: none;
      }
      #arCanvas {
        position: fixed;
        width: 1px; height: 1px;
        top: 0; left: 0;
        opacity: 0.01;
        pointer-events: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 16px;
      }
      #overlay p {
        color: white;
        font-size: 16px;
        font-family: sans-serif;
        text-align: center;
        padding: 0 30px;
      }
      #startBtn {
        padding: 18px 40px;
        font-size: 22px;
        background: #ff4081;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-family: sans-serif;
        position: relative;
        z-index: 99999;
        pointer-events: auto;
        -webkit-tap-highlight-color: transparent;
      }
    </style>

    <script>
      AFRAME.registerComponent('canvas-video', {
        init: function () {
          this.started = false;
          window.addEventListener('ar-start', () => {
            this.started = true;
            this._setup();
          });
        },

        _setup: function () {
          const video = document.getElementById('arVideo');
          const canvas = document.getElementById('arCanvas');
          const ctx = canvas.getContext('2d');

          video.addEventListener('loadedmetadata', () => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 360;
          });

          this.video = video;
          this.canvas = canvas;
          this.ctx = ctx;

          const texture = new THREE.CanvasTexture(canvas);
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;
          this.texture = texture;

          const geo = new THREE.PlaneGeometry(1.6, 0.9);
          const mat = new THREE.MeshBasicMaterial({
            map: texture,
            side: THREE.DoubleSide
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.rotation.x = -Math.PI / 2;
          this.el.setObject3D('mesh', mesh);
        },

        tick: function () {
          if (!this.started || !this.video || this.video.paused) return;
          if (this.canvas.width === 0) return;
          this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
          if (this.texture) this.texture.needsUpdate = true;
        }
      });
    </script>
  </head>

  <body>
    <video
      id="arVideo"
      src="video.mp4"
      loop
      muted
      playsinline
      webkit-playsinline
      preload="auto">
    </video>

    <canvas id="arCanvas" width="640" height="360"></canvas>

    <audio id="bgAudio" src="audio.mp3" loop preload="auto"></audio>

    <div id="overlay">
      <p>Наведи камеру на картину после запуска</p>
      <button id="startBtn">▶ Запустить AR</button>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
      style="pointer-events: none;"
    >
      <a-marker
        type="pattern"
        url="pattern-marker.patt"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2">
        <a-entity canvas-video></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      document.getElementById('startBtn').addEventListener('touchend', function (e) {
        e.preventDefault();
        startAR();
      });
      document.getElementById('startBtn').addEventListener('click', startAR);

      function startAR() {
  const video = document.getElementById('arVideo');
  const audio = document.getElementById('bgAudio');

  // Запрашиваем разрешение на датчики движения (iOS 13+)
  if (typeof DeviceOrientationEvent !== 'undefined' && 
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(function(response) {
        if (response === 'granted') {
          console.log('Датчики разрешены');
        }
      })
      .catch(console.error);
  }

  video.muted = true;
  video.play();

  audio.volume = 1.0;
  audio.muted = false;
  audio.play();

  window.dispatchEvent(new Event('ar-start'));
  document.getElementById('overlay').style.display = 'none';
};
      }
    </script>
  </body>
</html>
```

Просто **скопируй весь код целиком** и замени содержимое `index.html` полностью. В репозитории должно быть:
```
index.html
video.mp4
audio.mp3
pattern-marker.patt

<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WebAR Test - Motion Design</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      #ui-layer {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        text-align: center;
        font-family: sans-serif;
      }
      #startButton {
        padding: 15px 40px;
        background: #007AFF; /* Цвет Apple Blue */
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        cursor: pointer;
      }
      .hint {
        color: white;
        text-shadow: 1px 1px 2px black;
        margin-bottom: 10px;
        font-size: 14px;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <div id="ui-layer">
      <div class="hint">Наведи на маркер Hiro после нажатия</div>
      <button id="startButton">ЗАПУСТИТЬ AR</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <video 
          id="myVideo" 
          src="video.mp4" 
          preload="auto" 
          loop="true" 
          crossOrigin="anonymous" 
          muted 
          playsinline 
          webkit-playsinline>
        </video>
      </a-assets>

      <a-marker preset="hiro">
        <a-video
          src="#myVideo"
          width="1.6"
          height="0.9"
          position="0 0 0"
          rotation="-90 0 0">
        </a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const button = document.getElementById('startButton');
      const video = document.getElementById('myVideo');

      button.addEventListener('click', function() {
        // 1. Принудительный запуск видео
        video.play().then(() => {
            // 2. Включаем звук ПОСЛЕ того как видео успешно пошло
            video.muted = false; 
            console.log("AR Video Started");
        }).catch(err => {
            console.error("Ошибка автоплея:", err);
            // Если совсем плохо, пробуем запустить хотя бы без звука
            video.play();
        });
        
        // Скрываем кнопку
        document.getElementById('ui-layer').style.display = 'none';
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>Мой Первый WebAR Тест</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* Стили для кнопки Старт */
      #startButton {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff4081;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        cursor: pointer;
        z-index: 999; /* Чтобы была поверх всего */
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <button id="startButton">Включить AR и Звук</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <video id="myVideo" src="video.mp4" preload="auto" loop="true" crossOrigin="anonymous" muted></video>
      </a-assets>

      <a-marker preset="hiro">
        <a-video
          src="#myVideo"
          width="1.6"
          height="0.9"
          position="0 0 0"
          rotation="-90 0 0">
        </a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const button = document.getElementById('startButton');
      const video = document.getElementById('myVideo');

      button.addEventListener('click', function() {
        // Когда пользователь нажал кнопку:
        video.muted = false; // Включаем звук
        video.play();        // Запускаем видео
        button.style.display = 'none'; // Прячем кнопку
      });
    </script>
  </body>
</html>
